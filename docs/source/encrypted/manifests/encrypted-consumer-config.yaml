---
apiVersion: v1
kind: ConfigMap
metadata:
  name: encrypted-consumer-config
data:
  consumer.properties: |
    # Required connection configs for Kafka consumer and admin
    bootstrap.servers=[placeholder]
    security.protocol=[placeholder]
    sasl.jaas.config=[placeholder]
    sasl.mechanism=[placeholder]
    # Required for correctness in Apache Kafka clients prior to 2.6
    client.dns.lookup=use_all_dns_ips
    # Best practice for higher availability in Apache Kafka clients prior to 3.0
    session.timeout.ms=45000
    # Other configurations
    retries=0
    # group.id is required for consumer clients
    group.id=group1

    # Use AWS Glue Schema Registry for the (decrypted) Avro payload
    schema.registry.type=glue
    region=us-east-1
    registry.name=[placeholder]
    schemaAutoRegistrationEnabled=false

    # Enable payload envelope decryption. Presence of the key ARN turns it on; the AWS region for
    # KMS is derived from the ARN. Scope kms:Decrypt IAM to this key.
    payload.envelope.encryption.provider.aws-kms.key.arn=arn:aws:kms:us-east-1:123456789012:key/[placeholder]
    # Optional: plaintext-DEK cache TTL in ms (default 3600000 = 1h)
    # payload.envelope.encryption.provider.aws-kms.dek.cache.ttl.ms=3600000

    # Optional: assume an IAM role before connecting to KMS and Glue
    # assumeRoleArn=arn:aws:iam::123456789012:role/my-role
  user.configuration: |
    topicName: [placeholder]
    schemaType: avro
