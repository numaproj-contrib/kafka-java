apiVersion: v1
kind: ConfigMap
metadata:
  name: test-consumer-config
  namespace: default
data:
  consumer.properties: |
    bootstrap.servers=kafka.kafka.svc.cluster.local:9092
    security.protocol=PLAINTEXT
    client.dns.lookup=use_all_dns_ips
    session.timeout.ms=45000
    retries=0
    group.id=test-group
  user.configuration: |
    topicName: test-raw
    schemaType: raw
